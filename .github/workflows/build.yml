name: Build and Deploy Site

on:
  push:
    branches: [main]
    paths:
      - 'posts.json'
      - 'build.py'
      - 'src/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run build script
        run: python build.py

      - name: Commit built files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html sitemap.xml posts/
          git diff --staged --quiet || git commit -m "Auto-build: update generated HTML and sitemap"
          git push
